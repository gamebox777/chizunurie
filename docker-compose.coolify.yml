# Coolify 用: フロント/バック/DB を Docker Compose 1ファイルでデプロイする。
#
# 【方式】イメージは GitHub Actions（標準 Docker）でビルドして ghcr.io に push 済み。
#   Coolify はこのファイルの image: を pull するだけ（build はしない）。
#   → Coolify のビルド環境（npm ci が devDeps を入れない等）の問題を完全に回避する。
#   ビルドは .github/workflows/build-images.yml が main への push で自動実行する。
#
# 【初回セットアップ / 手順】docs/Coolifyデプロイ-compose.md 参照。
#
# ポイント：
# - `SERVICE_FQDN_*` / `SERVICE_URL_*` / `SERVICE_PASSWORD_*` は Coolify のマジック変数。
#   build しなくても実行時に Coolify が置換する（公開ドメイン＋TLS・強いパスワード生成）。
# - environment は必ずマップ形式（KEY: value）で書く。リスト形式（- KEY=value）だと
#   Coolify が 0:/1: の数値キーに変換して `non-string key ... environment: 0` で落ちる（coolify#5064）。
# - 公開するのは frontend だけ。backend / db はサービス名（backend / db）で内部接続する。

services:
  frontend:
    # ghcr.io の公開イメージを pull する。tag main は main への push 毎に更新される。
    image: ghcr.io/gamebox777/chizunurie-frontend:main
    restart: unless-stopped
    environment:
      # ↓ これを書くと Coolify が frontend に公開ドメイン＋TLS を割り当て、:3000 へルーティングする。
      #   割り当て後、Coolify の UI でこの FQDN を自分の独自ドメインに変更できる。
      SERVICE_FQDN_FRONTEND_3000: ""
      NODE_ENV: production
    expose:
      - "3000"
    depends_on:
      backend:
        condition: service_healthy

  backend:
    image: ghcr.io/gamebox777/chizunurie-backend:main
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3001"
      # DB は同じ compose 内の db サービス。パスワードは Coolify が自動生成（下の db と同じ変数）。
      DATABASE_URL: postgres://postgres:${SERVICE_PASSWORD_POSTGRES}@db:5432/chizunurie
      # better-auth のセッション署名鍵。Coolify が64文字の値を自動生成する。
      BETTER_AUTH_SECRET: ${SERVICE_PASSWORD_64_AUTH}
      # 公開URL（フロントの公開ドメイン）。https:// 付きなので Secure Cookie が有効になる。
      BETTER_AUTH_URL: ${SERVICE_URL_FRONTEND}
      FRONTEND_URL: ${SERVICE_URL_FRONTEND}
      # Google OAuth（開発と同じ値）。Coolify の UI で手動設定する。使わないなら空でよい。
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
    expose:
      - "3001"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      # frontend/backend の DATABASE_URL と同じマジック変数を使うので値が一致する。
      POSTGRES_PASSWORD: ${SERVICE_PASSWORD_POSTGRES}
      POSTGRES_DB: chizunurie
    # DBeaver 等から Tailscale 越しの SSH トンネルで覗くため、ホストの 127.0.0.1 にだけ
    # 5432 を公開する（インターネットには出ない・SSH=Tailscale 経由からのみ到達）。
    # 詳細は docs/本番DB-DBeaver接続.md を参照。
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
