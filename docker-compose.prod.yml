# フル Docker 版: フロント/バック/DB を全部 Docker で起動する（単一ホスト or ローカル検証用）
#
#   docker compose -f docker-compose.prod.yml up -d --build
#
# - dev 版（npm run dev）とは独立。DB ボリューム(postgres_data)は dev 版と共有されるので
#   データは引き継がれる（POSTGRES_PASSWORD の既定 devpassword も dev と一致）。
# - これはローカル/単一ホストでの「全部 Docker」検証用。Coolify 本番は各サービスを個別に
#   ビルドする（docs/デプロイ手順.md 参照）。このファイルは使わない。
# - 既定値は http://localhost 前提。Google ログインも試す場合は既存の開発用リダイレクト
#   URI（http://localhost:3001/api/auth/callback/google）がそのまま使える。

services:
  frontend:
    build:
      context: ./frontend
      args:
        # ★ rewrites() の中継先はビルド時に焼き込まれるため build args で渡す（実行時 env では効かない）
        BACKEND_URL: http://backend:3001
        # デバッグメニューの実行モード表示を「フル Docker」にする
        NEXT_PUBLIC_APP_ENV: docker
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
    depends_on:
      backend:
        condition: service_healthy

  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      PORT: "3001"
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-devpassword}@db:5432/chizunurie
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-dev-secret-change-me}
      # http のため Secure Cookie は無効（baseURL が http なので auth.ts 側で自動 off）
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3001}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpassword}
      POSTGRES_DB: chizunurie
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
