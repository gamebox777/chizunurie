# frontend / backend のイメージを「標準 Docker（GitHub Actions）」でビルドして
# ghcr.io に push する。Coolify はこのイメージを pull するだけ（build しない）。
# Coolify のビルド環境が devDeps を入れない等で壊れていても影響を受けない確実な経路。
#
# 公開イメージ:
#   ghcr.io/gamebox777/chizunurie-frontend:main
#   ghcr.io/gamebox777/chizunurie-backend:main
#
# 初回のみ必要な手順は docs/Coolifyデプロイ-compose.md 参照（パッケージ公開 or 認証情報）。
name: build-images

on:
  push:
    branches: [main]
  workflow_dispatch: # 手動実行も可

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # ghcr.io への push に必要
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: backend
            context: ./backend
            build_args: ""
          - service: frontend
            context: ./frontend
            # rewrites() の中継先はビルド時に焼き込まれる。compose のサービス名は backend。
            build_args: |
              BACKEND_URL=http://backend:3001
    steps:
      - uses: actions/checkout@v4

      # arm64 もビルドするため QEMU を有効化（Coolify サーバーが arm64 のため）。
      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          # Coolify サーバー(arm64)と一般的な amd64 の両方で動くマルチアーキイメージ。
          platforms: linux/amd64,linux/arm64
          build-args: ${{ matrix.build_args }}
          tags: |
            ghcr.io/gamebox777/chizunurie-${{ matrix.service }}:main
            ghcr.io/gamebox777/chizunurie-${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ビルド完了の通知だけ（デプロイは Coolify で手動）。
  #
  # Coolify は Tailscale 経由でしか到達できない（非公開）ため、GitHub クラウドの
  # ランナーからは API も webhook も叩けない。よって自動デプロイはせず、ここでは
  # 「このビルドをデプロイする手順」を表示するだけにする。
  #
  # 手動デプロイ手順（Coolify 上・Tailscale 接続して）:
  #   1. 最新で良ければ Redeploy を押すだけ（compose は pull_policy: always なので
  #      可変タグ :main でも必ず最新を pull する＝古いまま問題は起きない）。
  #   2. コミットを固定したい時は、Coolify の Environment Variables で
  #      IMAGE_TAG = <下に表示される commit-sha> にしてから Redeploy。
  #      （ghcr に :<sha> が全コミット分あるのでロールバックも同じ手順で可能）
  notify-build-done:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Build done — deploy manually in Coolify
        env:
          SHA: ${{ github.sha }}
        run: |
          echo "ghcr への push 完了。Coolify(Tailscale) で手動デプロイしてください。"
          echo "  - 最新で良い:           Coolify で Redeploy（pull_policy: always で最新を pull）"
          echo "  - コミット固定したい:   Coolify の env IMAGE_TAG=$SHA → Redeploy"
